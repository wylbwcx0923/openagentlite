server:
  port: 8888

# LLM模型配置
llm:
  qwen:
    api-key: your-api-key
    api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    model: qwen3-max

# 引擎配置
engine:
  react:
    max-steps: 10
    timeout: 300

# 工具配置
tools:
  search:
    enabled: true
  file:
    enabled: true
  calculator:
    enabled: true